- aid: ubiquiti:unifi-site-manager-api
  name: UniFi Site Manager API
  tags:
  - Networking
  - UniFi
  - Site Manager
  - Cloud
  humanURL: https://developer.ui.com/site-manager-api/
  baseURL: https://api.ui.com/v1
